<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 17px;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .section-title {
            color: #00d4ff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #00d4ff;
        }

        .link-button {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            font-size: 17px;
            font-weight: 500;
        }

        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,212,255,0.3);
            border-color: #00d4ff;
        }

        .link-button.whatsapp {
            background: #25D366;
            color: white;
            border-color: #25D366;
        }

        .link-button.instagram {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
            color: white;
            border: none;
        }

        .link-button.pdf {
            background: #fff;
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .icon {
            font-size: 24px;
            min-width: 24px;
        }

        .text {
            flex: 1;
            text-align: left;
        }

        .badge {
            background: #00d4ff;
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Modal solo para Hamburguesas */

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #00d4ff;
            color: #000;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        .pdf-viewer {
            flex: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🍽️ Menú Digital</h1>
        <p>Meta Panchos 🌭</p>
    </div>

    <div class="menu-section">
        <div class="section-title">📋 Nuestro Menú</div>

        <!-- MENU JPEG -->
        <a href="./menu.jpeg" target="_blank" class="link-button pdf">
            <span class="icon">🍕</span>
            <span class="text">Menú Principal</span>
            <span class="badge">VER</span>
        </a>

        <!-- PROMOS JPEG -->
        <a href="./promos.jpeg" target="_blank" class="link-button pdf">
            <span class="icon">🎁</span>
            <span class="text">Carta de Promos</span>
            <span class="badge">VER</span>
        </a>

        <!-- HAMBURGUESAS PDF (MODAL) -->
        <button onclick="openPDF('menu3')" class="link-button pdf">
            <span class="icon">🍔</span>
            <span class="text">Hamburguesas Smash</span>
            <span class="badge">VER</span>
        </button>
    </div>

    <div class="menu-section">
        <div class="section-title">💬 Contactos</div>

        <a href="https://wa.me/5492615174897" class="link-button whatsapp" target="_blank">
            <span class="icon">📱</span>
            <span class="text">Hacer Pedido por WhatsApp</span>
        </a>

        <a href="https://www.instagram.com/meta.panchos" class="link-button instagram" target="_blank">
            <span class="icon">📸</span>
            <span class="text">Síguenos en Instagram</span>
        </a>
    </div>
</div>

<!-- Modal Hamburguesas -->
<div id="modal-menu3" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>🍔 Hamburguesas Smash</h3>
            <button onclick="closeModal('menu3')" class="close-btn">×</button>
        </div>
        <iframe src="./Menu Hamburguesas.pdf" class="pdf-viewer"></iframe>
    </div>
</div>

<script>
function openPDF(menuId) {
    document.getElementById('modal-' + menuId).classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal(menuId) {
    document.getElementById('modal-' + menuId).classList.remove('active');
    document.body.style.overflow = 'auto';
}
</script>

</body>
</html>
